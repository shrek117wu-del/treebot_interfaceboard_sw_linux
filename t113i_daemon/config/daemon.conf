# Seeway Interface Board T113i Daemon Configuration
# /etc/seeway_interface/daemon.conf (Example)

[communication]
# transport=uart or transport=tcp
transport=tcp
# For TCP client
server_ip=127.0.0.1
server_port=9000
# For UART
# uart_device=/dev/ttyS3
# baud_rate=115200
# Reconnect interval when TCP connection is lost (ms)
reconnect_ms=2000
# Heartbeat timeout: link considered dead if no heartbeat within this window (ms)
heartbeat_timeout_ms=5000

[gpio]
# format: bank,pin,linux_num,is_output,active_low,label
pin_0=0,0,10,true,false,valve_1
pin_1=0,1,11,true,false,valve_2
pin_2=2,0,64,false,false,estop_btn

[adc]
# format: index,sysfs_path,scale,offset,unit
ch_0=0,/sys/bus/iio/devices/iio:device0/in_voltage0_raw,0.001,0.0,V

[power]
# format: on_cmd_id(hex),off_cmd_id(hex),gpio_num,active_low,min_on_ms,sequence_delay_ms
nx_rail=0x01,0x02,20,true,5000,1000

[logging]
# log_file=/var/log/seeway_daemon.log   # leave empty for stderr-only
# log_level: 0=DEBUG 1=INFO 2=WARN 3=ERROR (default: 1)
log_level=1
